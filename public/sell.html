<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Post a Listing — UniMarket MUT</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    .sell-layout { max-width: 680px; margin: 0 auto; padding: 2rem 0 4rem; }
    .image-upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 2.5rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: white;
      position: relative;
    }
    .image-upload-area:hover { border-color: var(--primary-light); background: #f0f7f4; }
    .image-upload-area input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .image-preview { width: 100%; max-height: 280px; object-fit: cover; border-radius: var(--radius); display: none; margin-top: 1rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <div><span class="logo-text">UniMarket</span><span class="logo-sub">MUT Campus</span></div>
  </a>
  <button class="hamburger" onclick="document.querySelector('.navbar-nav').classList.toggle('open')">☰</button>
  <ul class="navbar-nav">
    <li><a href="/listings">Browse</a></li>
    <span id="guest-links"><li><a href="/login">Login</a></li></span>
    <span id="user-links" style="display:none">
      <li><a href="/messages">Messages <span class="badge" id="msg-badge" style="display:none">0</span></a></li>
      <li><a href="/sell" class="btn-sell active">+ Sell</a></li>
      <li><a href="/dashboard">👤 <span id="nav-username"></span></a></li>
      <li><a href="#" onclick="logout()">Logout</a></li>
    </span>
  </ul>
</nav>

<div class="container">
  <div class="sell-layout">
    <div class="page-header">
      <h1 class="page-title" id="form-heading">Post a Listing</h1>
      <p class="page-subtitle" id="form-subheading">Sell your items to fellow MUT students</p>
    </div>

    <div class="card" style="padding:2rem">
      <div class="form-group">
        <label class="form-label">Item Photo</label>
        <div class="image-upload-area" id="upload-area">
          <input type="file" id="image-input" accept="image/*" onchange="previewImage(this)">
          <div id="upload-placeholder">
            <div style="font-size:2.5rem">📷</div>
            <p style="margin-top:0.5rem;font-weight:600">Click to upload a photo</p>
            <p style="font-size:0.8rem;color:var(--text-muted)">JPG, PNG, WEBP · Max 5MB</p>
          </div>
        </div>
        <img id="image-preview" class="image-preview" alt="Preview">
      </div>

      <div class="form-group">
        <label class="form-label">Item Title *</label>
        <input type="text" id="title" class="form-control" placeholder="e.g. Dell Latitude Laptop, Calculus Textbook" maxlength="150">
      </div>

      <div class="form-group">
        <label class="form-label">Description *</label>
        <textarea id="description" class="form-control" rows="4" placeholder="Describe your item — include specs, reason for selling, any defects..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Price (ZAR) *</label>
          <input type="number" id="price" class="form-control" placeholder="e.g. 3500" min="0" step="0.01">
        </div>
        <div class="form-group">
          <label class="form-label">Condition *</label>
          <select id="condition" class="form-control">
            <option value="">Select condition...</option>
            <option value="New">New</option>
            <option value="Like New">Like New</option>
            <option value="Good">Good</option>
            <option value="Fair">Fair</option>
            <option value="Poor">Poor</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Category *</label>
        <select id="category" class="form-control">
          <option value="">Select a category...</option>
        </select>
      </div>

      <div id="error-msg" class="alert alert-error" style="display:none"></div>

      <button class="btn btn-primary btn-full btn-lg" id="submit-btn" onclick="submitListing()">
        🚀 Post Listing
      </button>
      <a href="/dashboard" id="cancel-edit-btn" class="btn btn-outline btn-full btn-lg" style="display:none;margin-top:0.75rem">
        Cancel
      </a>
    </div>
  </div>
</div>

<footer class="footer"><p>© 2025 UniMarket MUT · Durban, South Africa</p></footer>
<div id="toast"></div>

<script src="/js/utils.js"></script>
<script>
  const editId = new URLSearchParams(window.location.search).get('edit');
  let existingListing = null;

  // Load categories, then if edit mode, prefill form
  fetch('/api/categories').then(r => r.json()).then(data => {
    const sel = document.getElementById('category');
    (data.categories || []).forEach(c => {
      sel.innerHTML += `<option value="${c.id}">${c.icon} ${c.name}</option>`;
    });
    if (editId) loadEditListing();
  });

  async function loadEditListing() {
    try {
      const res = await fetch(`/api/listings/${editId}`);
      const data = await res.json();
      if (!data.success) { showToast('Listing not found', 'error'); return; }
      existingListing = data.listing;

      // Update page headings
      document.title = 'Edit Listing — UniMarket MUT';
      document.getElementById('page-title').textContent = 'Edit Listing — UniMarket MUT';
      document.getElementById('form-heading').textContent = 'Edit Listing';
      document.getElementById('form-subheading').textContent = 'Update your listing details below';
      document.getElementById('submit-btn').textContent = '💾 Save Changes';
      document.getElementById('cancel-edit-btn').style.display = 'block';

      // Prefill fields
      document.getElementById('title').value = existingListing.title;
      document.getElementById('description').value = existingListing.description;
      document.getElementById('price').value = existingListing.price;
      document.getElementById('condition').value = existingListing.condition;
      document.getElementById('category').value = existingListing.category_id;

      // Show existing image
      if (existingListing.image_url) {
        const preview = document.getElementById('image-preview');
        const placeholder = document.getElementById('upload-placeholder');
        preview.src = existingListing.image_url;
        preview.style.display = 'block';
        placeholder.style.display = 'none';
      }
    } catch { showToast('Failed to load listing', 'error'); }
  }

  function previewImage(input) {
    const file = input.files[0];
    if (!file) return;
    const preview = document.getElementById('image-preview');
    const placeholder = document.getElementById('upload-placeholder');
    const reader = new FileReader();
    reader.onload = e => {
      preview.src = e.target.result;
      preview.style.display = 'block';
      placeholder.style.display = 'none';
    };
    reader.readAsDataURL(file);
  }

  async function submitListing() {
    const btn = document.getElementById('submit-btn');
    const errorEl = document.getElementById('error-msg');
    errorEl.style.display = 'none';

    const title = document.getElementById('title').value.trim();
    const description = document.getElementById('description').value.trim();
    const price = document.getElementById('price').value;
    const condition = document.getElementById('condition').value;
    const category_id = document.getElementById('category').value;
    const imageFile = document.getElementById('image-input').files[0];

    if (!title || !description || !price || !condition || !category_id) {
      errorEl.textContent = 'Please fill in all required fields.';
      errorEl.style.display = 'flex'; return;
    }
    if (parseFloat(price) < 0) {
      errorEl.textContent = 'Price cannot be negative.';
      errorEl.style.display = 'flex'; return;
    }

    btn.disabled = true;

    // EDIT MODE — PUT request (JSON, no image change supported via this route)
    if (editId) {
      btn.textContent = 'Saving...';
      try {
        const res = await fetch(`/api/listings/${editId}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description, price: parseFloat(price), condition, status: existingListing?.status || 'active' })
        });
        const data = await res.json();
        if (data.success) {
          showToast('Listing updated!', 'success');
          setTimeout(() => window.location.href = `/listing/${editId}`, 900);
        } else {
          errorEl.textContent = data.message || 'Failed to update listing.';
          errorEl.style.display = 'flex';
          btn.textContent = '💾 Save Changes';
          btn.disabled = false;
        }
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'flex';
        btn.textContent = '💾 Save Changes';
        btn.disabled = false;
      }
      return;
    }

    // CREATE MODE — POST with FormData
    btn.textContent = 'Posting...';
    const formData = new FormData();
    formData.append('title', title);
    formData.append('description', description);
    formData.append('price', price);
    formData.append('condition', condition);
    formData.append('category_id', category_id);
    if (imageFile) formData.append('image', imageFile);

    try {
      const res = await fetch('/api/listings', { method: 'POST', body: formData });
      const data = await res.json();
      if (data.success) {
        showToast('Listing posted successfully!', 'success');
        setTimeout(() => window.location.href = `/listing/${data.listing.id}`, 900);
      } else {
        errorEl.textContent = data.message || 'Failed to post listing.';
        errorEl.style.display = 'flex';
        btn.textContent = '🚀 Post Listing';
        btn.disabled = false;
      }
    } catch {
      errorEl.textContent = 'Network error. Please try again.';
      errorEl.style.display = 'flex';
      btn.textContent = '🚀 Post Listing';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
