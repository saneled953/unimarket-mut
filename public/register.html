<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — UniMarket MUT</title>
  <link rel="stylesheet" href="/css/style.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
    .auth-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: linear-gradient(135deg, #f5f2eb 0%, #e8f5ee 100%);
    }
    .auth-card {
      background: white;
      border-radius: var(--radius);
      box-shadow: 0 8px 40px rgba(26,58,42,0.12);
      padding: 2.5rem;
      width: 100%;
      max-width: 460px;
      border: 1px solid var(--border);
    }
    .auth-logo { text-align: center; margin-bottom: 1.75rem; }
    .auth-logo .brand { font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--primary); }
    .auth-logo .sub { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
    .auth-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 0.25rem; }
    .auth-subtitle { color: var(--text-muted); font-size: 0.875rem; margin-bottom: 1.5rem; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .auth-footer { text-align: center; margin-top: 1.25rem; font-size: 0.875rem; color: var(--text-muted); }
    .auth-footer a { color: var(--primary-light); font-weight: 600; }
    .password-strength { height: 4px; border-radius: 2px; margin-top: 0.4rem; transition: all 0.3s; }
    #error-msg { display: none; }
  </style>
</head>
<body>

<nav class="navbar">
  <a href="/" class="navbar-brand">
    <div>
      <span class="logo-text">UniMarket</span>
      <span class="logo-sub">MUT Campus</span>
    </div>
  </a>
</nav>

<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="brand">UniMarket</div>
      <div class="sub">Mangosuthu University of Technology</div>
    </div>

    <h2 class="auth-title">Create your account</h2>
    <p class="auth-subtitle">Join thousands of MUT students buying and selling on campus</p>

    <div class="alert alert-error" id="error-msg"></div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">First Name</label>
        <input type="text" id="first_name" class="form-control" placeholder="Sipho">
      </div>
      <div class="form-group">
        <label class="form-label">Last Name</label>
        <input type="text" id="last_name" class="form-control" placeholder="Dlamini">
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Student Number</label>
      <input type="text" id="student_number" class="form-control" placeholder="e.g. 21200123">
    </div>

    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input type="email" id="email" class="form-control" placeholder="student@mut.ac.za">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="At least 6 characters" oninput="checkStrength(this.value)">
      <div class="password-strength" id="pwd-strength"></div>
    </div>

    <div class="form-group">
      <label class="form-label">Confirm Password</label>
      <input type="password" id="confirm_password" class="form-control" placeholder="Repeat your password">
    </div>

    <button class="btn btn-primary btn-full btn-lg" id="register-btn" onclick="handleRegister()">
      Create Account
    </button>

    <div class="auth-footer">
      Already have an account? <a href="/login">Sign in</a>
    </div>
  </div>
</div>

<div id="toast"></div>
<script src="/js/utils.js"></script>
<script>
  function checkStrength(val) {
    const bar = document.getElementById('pwd-strength');
    if (val.length === 0) { bar.style.width = '0'; return; }
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#16a34a'];
    const widths = ['20%', '40%', '60%', '80%', '100%'];
    bar.style.background = colors[score - 1] || '#ef4444';
    bar.style.width = widths[score - 1] || '20%';
  }

  async function handleRegister() {
    const btn = document.getElementById('register-btn');
    const errorEl = document.getElementById('error-msg');
    errorEl.style.display = 'none';

    const first = document.getElementById('first_name').value.trim();
    const last = document.getElementById('last_name').value.trim();
    const student_number = document.getElementById('student_number').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirm_password').value;

    if (!first || !last || !student_number || !email || !password || !confirm) {
      errorEl.textContent = 'Please fill in all fields.';
      errorEl.style.display = 'flex'; return;
    }
    if (password !== confirm) {
      errorEl.textContent = 'Passwords do not match.';
      errorEl.style.display = 'flex'; return;
    }
    if (password.length < 6) {
      errorEl.textContent = 'Password must be at least 6 characters.';
      errorEl.style.display = 'flex'; return;
    }

    btn.textContent = 'Creating account...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ full_name: `${first} ${last}`, student_number, email, password })
      });
      const data = await res.json();

      if (data.success) {
        showToast('Account created! Redirecting...', 'success');
        setTimeout(() => window.location.href = data.redirect || '/dashboard', 800);
      } else {
        const msg = data.errors ? data.errors[0].msg : data.message;
        errorEl.textContent = msg || 'Registration failed.';
        errorEl.style.display = 'flex';
        btn.textContent = 'Create Account';
        btn.disabled = false;
      }
    } catch {
      errorEl.textContent = 'Network error. Please try again.';
      errorEl.style.display = 'flex';
      btn.textContent = 'Create Account';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
